    <script>
      window.addEventListener("error", function (event) {
        const errorObj = {
          message: event.message,
          source: event.filename,
          lineno: event.lineno,
          colno: event.colno,
          stack: event.error ? event.error.stack : null
        };
        window.parent.postMessage(
          { action: "error", error: JSON.stringify(errorObj) },
          "*"
        );
        event.preventDefault();
      });

  function handleImportError(error) {
    throw new Error('Import module failed: ' + error.target.src);
  }

  const observer = new MutationObserver(mutations => {
    mutations.forEach(mutation => {
      mutation.addedNodes.forEach(node => {
        if (node.tagName === 'SCRIPT' && node.type === 'module') {
          node.onerror = handleImportError;
        }
      });
    });
  });

  observer.observe(document.documentElement, { childList: true, subtree: true });

  document.querySelectorAll('script[type="module"]').forEach(script => {
    script.onerror = handleImportError;
  });

  
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});

    <script type="text/babel" data-type="module">
      		  import {createRoot} from "react-dom/client";
            
      		  import React, { useState, useMemo } from 'react';
import { Droplets, RefreshCw, Eye, MousePointerClick, Coffee, Palette } from 'lucide-react';

const LIQUID_PROFILES = {
  water: {
    name: '清水',
    bodyColors: ['#d0eef8', '#a5d6e9', '#8fc6dc'],
    bodyOpacities: [0.55, 0.7, 0.82],
    edgeTint: '#6eabc8',
    edgeTintOpacity: 0.45,
    innerGlowColor: 'rgba(255,255,255,0.7)',
    innerSpotColor: 'rgba(255, 255, 255, 0.7)',
    strokeColor: '#3a7595',
    shadowColor: '#d5dde5',
    btnColor: 'bg-sky-100 text-sky-600 hover:bg-sky-200 border-sky-200'
  },
  coffee: {
    name: '咖啡',
    bodyColors: ['#b8845c', '#9b6942', '#7a5030'],
    bodyOpacities: [0.82, 0.88, 0.94],
    edgeTint: '#5a381e',
    edgeTintOpacity: 0.5,
    innerGlowColor: 'rgba(255,230,200,0.55)',
    innerSpotColor: 'rgba(255, 255, 255, 0.7)',
    strokeColor: '#3d2514',
    shadowColor: '#d5dde5',
    btnColor: 'bg-amber-100 text-amber-800 hover:bg-amber-200 border-amber-200'
  },
  tea: {
    name: '茶渍',
    bodyColors: ['#edd88a', '#d4a940', '#b88a25'],
    bodyOpacities: [0.7, 0.78, 0.85],
    edgeTint: '#9a6d15',
    edgeTintOpacity: 0.45,
    innerGlowColor: 'rgba(255,245,210,0.6)',
    innerSpotColor: 'rgba(255, 255, 255, 0.7)',
    strokeColor: '#7a5113',
    shadowColor: '#d5dde5',
    btnColor: 'bg-yellow-100 text-yellow-700 hover:bg-yellow-200 border-yellow-200'
  },
  ketchup: {
    name: '番茄酱',
    bodyColors: ['#e04540', '#c2221b', '#9b1612'],
    bodyOpacities: [0.9, 0.95, 1],
    edgeTint: '#6e0c08',
    edgeTintOpacity: 0.55,
    innerGlowColor: 'rgba(255,180,180,0.5)',
    innerSpotColor: 'rgba(255, 255, 255, 0.7)',
    strokeColor: '#470502',
    shadowColor: '#d5dde5',
    btnColor: 'bg-red-100 text-red-700 hover:bg-red-200 border-red-200'
  },
  soysauce: {
    name: '酱油渍',
    bodyColors: ['#a35a22', '#853e12', '#541f02'],
    bodyOpacities: [0.88, 0.93, 0.98],
    edgeTint: '#2e1000',
    edgeTintOpacity: 0.55,
    innerGlowColor: 'rgba(255,220,180,0.45)',
    innerSpotColor: 'rgba(255, 255, 255, 0.7)',
    strokeColor: '#361502',
    shadowColor: '#d5dde5',
    btnColor: 'bg-orange-950 text-white hover:bg-orange-900 border-orange-900'
  }
};

function LiquidPuddle() {
  const [seed, setSeed] = useState(0);
  const [viewType, setViewType] = useState('perspective');
  const [liquidType, setLiquidType] = useState('water');
  
  const currentLiquid = LIQUID_PROFILES[liquidType];

  const generateNew = () => setSeed(Math.random());

  const puddleData = useMemo(() => {
    const size = 300;
    const cx = size / 2;
    const cy = size / 2;
    
    const squashFactor = viewType === 'top' ? 1 : 0.38;
    
    const phase1 = Math.random() * Math.PI * 2;
    const phase2 = Math.random() * Math.PI * 2;
    const phase3 = Math.random() * Math.PI * 2;
    const phase4 = Math.random() * Math.PI * 2;

    const numPoints = 30;
    const angleStep = (Math.PI * 2) / numPoints;
    const basePoints = [];

    for (let i = 0; i < numPoints; i++) {
      const angle = i * angleStep;
      const wave = 
        Math.sin(angle * 2 + phase1) * 0.4 + 
        Math.cos(angle * 3 + phase2) * 0.3 + 
        Math.sin(angle * 4 + phase3) * 0.2 +
        Math.cos(angle * 6 + phase4) * 0.15;
        
      const r = size * 0.32 + wave * size * 0.12;
      
      basePoints.push({
        x: cx + Math.cos(angle) * r,
        y: cy + Math.sin(angle) * r * squashFactor
      });
    }

    const getPath = (points) => {
      const tension = 0.25;
      let path = `M ${points[0].x} ${points[0].y}`;
      for (let i = 0; i < points.length; i++) {
        const p0 = points[(i - 1 + points.length) % points.length];
        const p1 = points[i];
        const p2 = points[(i + 1) % points.length];
        const p3 = points[(i + 2) % points.length];

        const cp1x = p1.x + (p2.x - p0.x) * tension;
        const cp1y = p1.y + (p2.y - p0.y) * tension;
        const cp2x = p2.x - (p3.x - p1.x) * tension;
        const cp2y = p2.y - (p3.y - p1.y) * tension;

        path += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`;
      }
      return path;
    };

    const mainPath = getPath(basePoints);

    const droplets = [];
    const numDroplets = 2 + Math.floor(Math.random() * 4);
    for (let i = 0; i < numDroplets; i++) {
      const dropAngle = Math.random() * Math.PI * 2;
      const dist = size * 0.45 + Math.random() * 30;
      const dropCx = cx + Math.cos(dropAngle) * dist;
      const dropCy = cy + Math.sin(dropAngle) * dist * squashFactor;
      const dropSize = 5 + Math.random() * 12;
      
      const dropPoints = [];
      for (let j = 0; j < 6; j++) {
        const a = j * (Math.PI * 2) / 6;
        const r = dropSize * 0.8 + Math.random() * dropSize * 0.4;
        dropPoints.push({
          x: dropCx + Math.cos(a) * r,
          y: dropCy + Math.sin(a) * r * squashFactor
        });
      }
      droplets.push({
        path: getPath(dropPoints),
        cx: dropCx,
        cy: dropCy,
        size: dropSize
      });
    }

    const innerHighlights = [];
    const numSpots = 1; 
    for (let i = 0; i < numSpots; i++) {
      const spotAngle = Math.PI * 1.15 + (i * 0.15) + (Math.random() * 0.1); 
      const spotDist = size * 0.22 + (i * 12) + (Math.random() * 10);
      const spotCx = cx + Math.cos(spotAngle) * spotDist;
      const spotCy = cy + Math.sin(spotAngle) * spotDist * squashFactor;
      
      const rx = 12 + Math.random() * 4;
      const ry = 4.5 + Math.random() * 2;
      const rotation = 0; // Force horizontal alignment

      innerHighlights.push({ cx: spotCx, cy: spotCy, rx, ry, rotation });
    }

    return { mainPath, droplets, innerHighlights, cx, cy };
  }, [seed, viewType]);

  return (
    <div className="flex flex-col items-center justify-center min-h-screen bg-white p-6 font-sans">
      <div className="mb-6 text-center">
        <h1 className="text-2xl font-bold text-slate-800 flex items-center justify-center gap-2 mb-2">
          <Droplets className="text-sky-500" />
          多视角水洼生成器
        </h1>
        <p className="text-slate-500 text-sm max-w-md mb-4">
          已切换至：精细层层堆叠边缘的 2D 动漫手绘风格
        </p>
      </div>

      <div className="flex flex-wrap items-center justify-center gap-2 mb-6">
        {Object.entries(LIQUID_PROFILES).map(([key, profile]) => (
          <button
            key={key}
            onClick={() => setLiquidType(key)}
            className={`flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-medium transition-all border ${
              liquidType === key 
                ? `${profile.btnColor} shadow-sm ring-2 ring-offset-1 ring-slate-300` 
                : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'
            }`}
          >
            {key === 'coffee' ? <Coffee size={14} /> : <Palette size={14} />}
            {profile.name}
          </button>
        ))}
      </div>

      <div className="flex items-center gap-2 bg-slate-50 p-1 rounded-xl mb-6 shadow-sm border border-slate-200">
        <button
          onClick={() => setViewType('top')}
          className={`flex items-center gap-2 px-6 py-2 rounded-lg text-sm font-medium transition-all ${
            viewType === 'top' 
              ? 'bg-white shadow-sm text-sky-600' 
              : 'text-slate-500 hover:text-slate-700'
          }`}
        >
          <Eye size={16} />
          俯视图 (Top View)
        </button>
        <button
          onClick={() => setViewType('perspective')}
          className={`flex items-center gap-2 px-6 py-2 rounded-lg text-sm font-medium transition-all ${
            viewType === 'perspective' 
              ? 'bg-white shadow-sm text-sky-600' 
              : 'text-slate-500 hover:text-slate-700'
          }`}
        >
          <MousePointerClick size={16} />
          正视图/透视 (Front View)
        </button>
      </div>

      <div className="relative bg-white rounded-3xl p-4 mb-8 overflow-hidden transition-all duration-500"
           style={{ backgroundImage: 'radial-gradient(#e2e8f0 1px, transparent 1px)', backgroundSize: '16px 16px' }}>
        <svg 
          viewBox="0 0 300 300" 
          className="w-80 h-80 relative z-10 transition-transform duration-500"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            {/* Shadow */}
            <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow 
                dx={viewType === 'perspective' ? 4 : 1} 
                dy={viewType === 'perspective' ? 5 : 1} 
                stdDeviation="0" 
                floodColor={currentLiquid.shadowColor} 
                floodOpacity="1" 
              />
            </filter>

            {/* Soft inner glow blur filter */}
            <filter id="inner-glow-blur" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="4" />
            </filter>

            {/* Water Body: simple top-left to bottom-right linear gradient */}
            <linearGradient id="water-body" x1="20%" y1="15%" x2="80%" y2="90%">
              <stop offset="0%" stopColor={currentLiquid.bodyColors[0]} stopOpacity={currentLiquid.bodyOpacities[0]} />
              <stop offset="50%" stopColor={currentLiquid.bodyColors[1]} stopOpacity={currentLiquid.bodyOpacities[1]} />
              <stop offset="100%" stopColor={currentLiquid.bodyColors[2]} stopOpacity={currentLiquid.bodyOpacities[2]} />
            </linearGradient>

            {/* Edge tint: a darker version that sits under the outline to give saturation depth */}
            <linearGradient id="edge-tint" x1="20%" y1="10%" x2="85%" y2="95%">
              <stop offset="0%" stopColor={currentLiquid.edgeTint} stopOpacity="0.1" />
              <stop offset="50%" stopColor={currentLiquid.edgeTint} stopOpacity={currentLiquid.edgeTintOpacity * 0.6} />
              <stop offset="100%" stopColor={currentLiquid.edgeTint} stopOpacity={currentLiquid.edgeTintOpacity} />
            </linearGradient>

            {/* Clip Path for puddle */}
            <clipPath id="puddle-clip">
              <path d={puddleData.mainPath} />
            </clipPath>
          </defs>

          {/* MAIN PUDDLE GROUP */}
          <g filter="url(#drop-shadow)">
            {/* Layer 1: Base fill */}
            <path d={puddleData.mainPath} fill="url(#water-body)" />

            {/* Layer 2: Edge tint - thicker stroke clipped inside, gives saturated depth at edges */}
            <path 
              d={puddleData.mainPath} 
              fill="none" 
              stroke="url(#edge-tint)" 
              strokeWidth="10" 
              clipPath="url(#puddle-clip)" 
            />

            {/* Layer 3: Inner white glow - wide blurred stroke clipped inside, soft light band not a hard line */}
            <path 
              d={puddleData.mainPath} 
              fill="none" 
              stroke={currentLiquid.innerGlowColor}
              strokeWidth="14" 
              clipPath="url(#puddle-clip)" 
              filter="url(#inner-glow-blur)"
            />

            {/* Layer 4: Inner Reflection Spots (Main and secondary) */}
            {puddleData.innerHighlights.map((spot, idx) => (
              <g key={`inner-spot-group-${idx}`}>
                {/* Main Highlight */}
                <ellipse 
                  cx={spot.cx} 
                  cy={spot.cy} 
                  rx={spot.rx} 
                  ry={spot.ry}
                  fill={currentLiquid.innerSpotColor} 
                  clipPath="url(#puddle-clip)"
                />
                {/* Small Secondary Highlight (to the right) */}
                <ellipse 
                  cx={spot.cx + spot.rx * 1.5} 
                  cy={spot.cy} 
                  rx={spot.rx * 0.3} 
                  ry={spot.ry * 0.3}
                  fill={currentLiquid.innerSpotColor} 
                  clipPath="url(#puddle-clip)"
                />
              </g>
            ))}

            {/* Layer 5: Outer stroke (the main dark outline) */}
            <path d={puddleData.mainPath} fill="none" stroke={currentLiquid.strokeColor} strokeWidth="2.5" />
          </g>

          {/* SCATTERED DROPLETS */}
          {puddleData.droplets.map((drop, idx) => (
            <g key={`drop-${idx}`} filter="url(#drop-shadow)">
              <clipPath id={`drop-clip-${idx}`}>
                <path d={drop.path} />
              </clipPath>
              
              {/* Droplet body */}
              <path d={drop.path} fill="url(#water-body)" />
              {/* Edge tint for droplet */}
              <path d={drop.path} fill="none" stroke="url(#edge-tint)" strokeWidth="4" clipPath={`url(#drop-clip-${idx})`} />
              {/* Soft inner glow for droplet */}
              <path d={drop.path} fill="none" stroke={currentLiquid.innerGlowColor} strokeWidth="6" clipPath={`url(#drop-clip-${idx})`} filter="url(#inner-glow-blur)" />
              {/* Outer stroke */}
              <path d={drop.path} fill="none" stroke={currentLiquid.strokeColor} strokeWidth="1.2" />
              {/* Dual highlights */}
              <ellipse
                cx={drop.cx - drop.size * 0.2}
                cy={drop.cy - drop.size * 0.2}
                rx={drop.size * 0.28}
                ry={drop.size * 0.18}
                fill="rgba(255,255,255,0.88)"
                clipPath={`url(#drop-clip-${idx})`}
              />
              <ellipse
                cx={drop.cx + drop.size * 0.15}
                cy={drop.cy - drop.size * 0.3}
                rx={drop.size * 0.1}
                ry={drop.size * 0.07}
                fill="rgba(255,255,255,0.7)"
                clipPath={`url(#drop-clip-${idx})`}
              />
            </g>
          ))}
        </svg>
      </div>

      <button 
        onClick={generateNew}
        className="flex items-center gap-2 bg-sky-500 hover:bg-sky-600 text-white px-8 py-3 rounded-full font-medium transition-all shadow-lg shadow-sky-500/30 hover:shadow-sky-500/50 active:scale-95"
      >
        <RefreshCw size={18} />
        生成新形态
      </button>

    </div>
  );
}
      		  createRoot(document.getElementById("root")).render(
             <>
      		    <LiquidPuddle />
              </>
      		    );
              window.parent.postMessage({ action: "ready" }, "*");
    </script>
