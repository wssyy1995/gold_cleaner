<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纹理生成器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            background-color: #f0f0f0;
        }
        canvas {
            border: 1px solid #ccc;
            background-color: #fff;
            margin-bottom: 20px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        .info {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>纹理生成器</h1>
    <canvas id="textureCanvas" width="512" height="512"></canvas>
    <div class="controls">
        <button onclick="generateUrineStainAndScale()">生成尿渍与尿垢</button>
        <button onclick="generateCircularUrineStainAndScale()">生成圆环尿渍与尿垢</button>
        <button onclick="generateRust()">生成铁锈</button>
        <button onclick="generateCircularRust()">生成圆环铁锈</button>
        <button onclick="downloadTexture()">下载纹理</button>
    </div>
    <div class="info">
        <p>点击按钮生成不同类型的纹理。纹理会以斑驳、自然的效果呈现。</p>
        <p>请注意：生成的纹理可能因为随机性而每次不同。</p>
    </div>

    <script>
        const canvas = document.getElementById('textureCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        // Simple Perlin Noise implementation (for demonstration purposes)
        // A more sophisticated Perlin Noise library could be used for better quality
        function createNoiseGrid(gridSize) {
            const grid = [];
            for (let y = 0; y < gridSize + 1; y++) {
                grid[y] = [];
                for (let x = 0; x < gridSize + 1; x++) {
                    grid[y][x] = {
                        x: Math.random() * 2 - 1, // -1 to 1
                        y: Math.random() * 2 - 1
                    };
                }
            }
            return grid;
        }

        function dotProduct(gradient, x, y) {
            return gradient.x * x + gradient.y * y;
        }

        function interpolate(a, b, weight) {
            return (a + (b - a) * (3 - weight * 2) * weight * weight); // Smootherstep
        }

        let noiseGrid = createNoiseGrid(8); // Initial grid

        function getPerlinNoise(x, y, scale = 0.1, octaves = 4, persistence = 0.5) {
            x *= scale;
            y *= scale;

            let total = 0;
            let frequency = 1;
            let amplitude = 1;
            let maxVal = 0;

            for (let i = 0; i < octaves; i++) {
                let scaledX = x * frequency;
                let scaledY = y * frequency;

                let x0 = Math.floor(scaledX);
                let y0 = Math.floor(scaledY);
                let x1 = x0 + 1;
                let y1 = y0 + 1;

                let sx = scaledX - x0;
                let sy = scaledY - y0;

                // Ensure noiseGrid is large enough for current frequency
                let currentGridSize = Math.max(x1, y1) + 1;
                if (currentGridSize > noiseGrid.length -1) { // -1 because grid is size+1
                    noiseGrid = createNoiseGrid(currentGridSize * 2); // Recreate with larger size
                }

                let n00 = dotProduct(noiseGrid[y0][x0], sx, sy);
                let n01 = dotProduct(noiseGrid[y1][x0], sx, sy - 1);
                let n10 = dotProduct(noiseGrid[y0][x1], sx - 1, sy);
                let n11 = dotProduct(noiseGrid[y1][x1], sx - 1, sy - 1);

                let ix0 = interpolate(n00, n10, sx);
                let ix1 = interpolate(n01, n11, sx);

                total += interpolate(ix0, ix1, sy) * amplitude;
                maxVal += amplitude;

                amplitude *= persistence;
                frequency *= 2;
            }

            return (total / maxVal + 1) / 2; // Normalize to 0-1
        }

        function generatePatchyTexture(colorStops, numPatches, minRadius, maxRadius, maxAlpha, centerAreaFactor = 0.6, noiseScale = 0.05, noiseOctaves = 6, noisePersistence = 0.5, clearCanvas = true) {
            if (clearCanvas) {
                ctx.clearRect(0, 0, width, height);
            }
            ctx.globalCompositeOperation = 'source-over'; // Reset blend mode

            for (let i = 0; i < numPatches; i++) {
                const centerX = width * (0.5 - centerAreaFactor / 2 + Math.random() * centerAreaFactor);
                const centerY = height * (0.5 - centerAreaFactor / 2 + Math.random() * centerAreaFactor);
                const radius = minRadius + Math.random() * (maxRadius - minRadius);
                const rotation = Math.random() * Math.PI * 2; // Random rotation for elliptical patches

                // Create a temporary canvas for the patch
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = width;
                tempCanvas.height = height;
                const tempCtx = tempCanvas.getContext('2d');

                tempCtx.save();
                tempCtx.translate(centerX, centerY);
                tempCtx.rotate(rotation);

                const imageData = tempCtx.createImageData(width, height);
                const data = imageData.data;

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        // Apply reverse transformation to get original coordinates relative to patch center
                        const rotatedX = (x - centerX) * Math.cos(-rotation) - (y - centerY) * Math.sin(-rotation);
                        const rotatedY = (x - centerX) * Math.sin(-rotation) + (y - centerY) * Math.cos(-rotation);

                        const dist = Math.sqrt(rotatedX * rotatedX + rotatedY * rotatedY);
                        const normalizedDist = dist / radius;

                        if (normalizedDist > 1) { // Outside the patch circle
                            continue;
                        }

                        const noiseVal = getPerlinNoise(x, y, noiseScale, noiseOctaves, noisePersistence); // Perlin noise for patch internal variation
                        const edgeFade = 1 - normalizedDist; // Fade towards the edge

                        // Combine noise and edge fade
                        const intensity = noiseVal * edgeFade * edgeFade; // Stronger fade
                        let alpha = intensity * maxAlpha;

                        // Further adjust alpha for watery effect
                        if (alpha > 0.8 * maxAlpha) { // Darker, more opaque in the "body" of the stain
                            alpha = maxAlpha;
                        } else if (alpha < 0.2 * maxAlpha) { // Very faint at the edges
                            alpha *= 0.5;
                        }


                        const color = getColorFromStops(colorStops, noiseVal);

                        const index = (y * width + x) * 4;
                        data[index + 0] = color.r;
                        data[index + 1] = color.g;
                        data[index + 2] = color.b;
                        data[index + 3] = alpha * 255; // Apply alpha
                    }
                }
                tempCtx.putImageData(imageData, 0, 0);
                tempCtx.restore();

                ctx.drawImage(tempCanvas, 0, 0); // Draw the patch onto the main canvas
            }
        }

        function getColorFromStops(colorStops, value) {
            if (value <= colorStops[0].stop) return colorStops[0].color;
            if (value >= colorStops[colorStops.length - 1].stop) return colorStops[colorStops.length - 1].color;

            for (let i = 0; i < colorStops.length - 1; i++) {
                const s1 = colorStops[i];
                const s2 = colorStops[i + 1];
                if (value >= s1.stop && value < s2.stop) {
                    const t = (value - s1.stop) / (s2.stop - s1.stop);
                    return {
                        r: Math.round(s1.color.r + t * (s2.color.r - s1.color.r)),
                        g: Math.round(s1.color.g + t * (s2.color.g - s1.color.g)),
                        b: Math.round(s1.color.b + t * (s2.color.b - s1.color.b))
                    };
                }
            }
            return { r: 0, g: 0, b: 0 }; // Should not happen
        }

        function generateRust() {
            const colorStops = [
                { stop: 0.0, color: { r: 180, g: 60, b: 0 } },  // Deep red-orange
                { stop: 0.3, color: { r: 200, g: 80, b: 0 } },  // Brighter orange
                { stop: 0.6, color: { r: 150, g: 50, b: 0 } },  // Darker rust
                { stop: 1.0, color: { r: 100, g: 30, b: 0 } }   // Very dark brown-red
            ];
            generatePatchyTexture(colorStops, 20, 60, 180, 0.8, 0.6, 0.05, 6, 0.5); // 20 patches, radius 60-180, max alpha 0.8, 60% center area
        }

        function generateUrineStainAndScale() {
            // First, generate the urine stain base layer, without clearing the canvas
            const urineStainColorStops = [
                { stop: 0.0, color: { r: 255, g: 255, b: 180 } },
                { stop: 0.3, color: { r: 245, g: 235, b: 100 } },
                { stop: 0.6, color: { r: 220, g: 190, b: 80 } },
                { stop: 1.0, color: { r: 180, g: 140, b: 50 } }
            ];
            // Use clearCanvas = true for the first layer to ensure a clean start
            generatePatchyTexture(urineStainColorStops, 12, 90, 220, 0.7, 0.6, 0.03, 8, 0.6, true);

            // Then, overlay urine scale patches
            const urineScaleColorStops = [
                { stop: 0.0, color: { r: 255, g: 255, b: 240 } }, // Off-white
                { stop: 0.3, color: { r: 230, g: 230, b: 200 } }, // Light yellow-grey
                { stop: 0.6, color: { r: 200, g: 190, b: 160 } }, // Dirty beige
                { stop: 1.0, color: { r: 170, g: 160, b: 130 } }  // Darker yellow-brown
            ];
            // Use clearCanvas = false for subsequent layers to overlay
            generatePatchyTexture(urineScaleColorStops, 8, 50, 150, 0.5, 0.6, 0.04, 7, 0.5, false); // Fewer, smaller, more opaque scale patches
        }

        function generateCircularPatchyTexture(colorStops, numPatches, minInnerRadius, maxOuterRadius, maxAlpha, centerAreaFactor = 0.6, noiseScale = 0.05, noiseOctaves = 6, noisePersistence = 0.5, clearCanvas = true) {
            if (clearCanvas) {
                ctx.clearRect(0, 0, width, height);
            }
            ctx.globalCompositeOperation = 'source-over'; // Reset blend mode

            // Define the central circular area for the ring
            const ringCenterX = width / 2;
            const ringCenterY = height / 2;

            for (let i = 0; i < numPatches; i++) {
                // Ensure patch centers are within the general central area
                const centerX = width * (0.5 - centerAreaFactor / 2 + Math.random() * centerAreaFactor);
                const centerY = height * (0.5 - centerAreaFactor / 2 + Math.random() * centerAreaFactor);
                
                // Radius of the individual patch, should be smaller than the ring width
                const patchRadius = (maxOuterRadius - minInnerRadius) / 3 + Math.random() * ((maxOuterRadius - minInnerRadius) / 2); 
                
                const rotation = Math.random() * Math.PI * 2; // Random rotation for elliptical patches

                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = width;
                tempCanvas.height = height;
                const tempCtx = tempCanvas.getContext('2d');

                tempCtx.save();
                tempCtx.translate(centerX, centerY);
                tempCtx.rotate(rotation);

                const imageData = tempCtx.createImageData(width, height);
                const data = imageData.data;

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const rotatedX = (x - centerX) * Math.cos(-rotation) - (y - centerY) * Math.sin(-rotation);
                        const rotatedY = (x - centerX) * Math.sin(-rotation) + (y - centerY) * Math.cos(-rotation);

                        const distFromPatchCenter = Math.sqrt(rotatedX * rotatedX + rotatedY * rotatedY);
                        const normalizedDistFromPatchCenter = distFromPatchCenter / patchRadius;

                        if (normalizedDistFromPatchCenter > 1) { // Outside the individual patch circle
                            continue;
                        }

                        // Calculate distance from the center of the main canvas to check if it's within the ring
                        const distFromRingCenter = Math.sqrt(Math.pow(x - ringCenterX, 2) + Math.pow(y - ringCenterY, 2));

                        // --- 边缘渐变逻辑优化 ---
                        let ringEdgeFade = 1;
                        const fadeRange = 30; // 渐变范围，可以调整这个值来控制渐变宽度

                        // 内部边缘渐变
                        if (distFromRingCenter < minInnerRadius + fadeRange) {
                            ringEdgeFade *= Math.max(0, (distFromRingCenter - minInnerRadius) / fadeRange);
                        }
                        // 外部边缘渐变
                        if (distFromRingCenter > maxOuterRadius - fadeRange) {
                            ringEdgeFade *= Math.max(0, (maxOuterRadius - distFromRingCenter) / fadeRange);
                        }
                        
                        // 如果完全在环外，则不绘制
                        if (distFromRingCenter < minInnerRadius || distFromRingCenter > maxOuterRadius) {
                            ringEdgeFade = 0;
                        }
                        // --- 边缘渐变逻辑优化结束 ---

                        const noiseVal = getPerlinNoise(x, y, noiseScale, noiseOctaves, noisePersistence); // Perlin noise for patch internal variation
                        const edgeFade = 1 - normalizedDistFromPatchCenter; // Fade towards the edge of the individual patch

                        const intensity = noiseVal * edgeFade * edgeFade; // Stronger fade
                        let alpha = intensity * maxAlpha;

                        // Further adjust alpha for watery effect
                        if (alpha > 0.8 * maxAlpha) { // Darker, more opaque in the "body" of the stain
                            alpha = maxAlpha;
                        } else if (alpha < 0.2 * maxAlpha) { // Very faint at the edges
                            alpha *= 0.5;
                        }

                        const color = getColorFromStops(colorStops, noiseVal);

                        const index = (y * width + x) * 4;
                        data[index + 0] = color.r;
                        data[index + 1] = color.g;
                        data[index + 2] = color.b;
                        data[index + 3] = alpha * 255; // Apply alpha
                    }
                }
                tempCtx.putImageData(imageData, 0, 0);
                tempCtx.restore();

                ctx.drawImage(tempCanvas, 0, 0); // Draw the patch onto the main canvas
            }
        }

        function generateCircularUrineStainAndScale() {
            // Define a circular ring area
            const innerRadius = 100; // Inner radius of the ring
            const outerRadius = 200; // Outer radius of the ring

            // First, generate the urine stain base layer, without clearing the canvas
            const urineStainColorStops = [
                { stop: 0.0, color: { r: 255, g: 255, b: 180 } },
                { stop: 0.3, color: { r: 245, g: 235, b: 100 } },
                { stop: 0.6, color: { r: 220, g: 190, b: 80 } },
                { stop: 1.0, color: { r: 180, g: 140, b: 50 } }
            ];
            generateCircularPatchyTexture(urineStainColorStops, 15, innerRadius, outerRadius, 0.7, 0.6, 0.03, 8, 0.6, true);

            // Then, overlay urine scale patches
            const urineScaleColorStops = [
                { stop: 0.0, color: { r: 255, g: 255, b: 240 } },
                { stop: 0.3, color: { r: 230, g: 230, b: 200 } },
                { stop: 0.6, color: { r: 200, g: 190, b: 160 } },
                { stop: 1.0, color: { r: 170, g: 160, b: 130 } }
            ];
            generateCircularPatchyTexture(urineScaleColorStops, 10, innerRadius, outerRadius, 0.5, 0.6, 0.04, 7, 0.5, false);
        }

        function generateCircularRust() {
            const colorStops = [
                { stop: 0.0, color: { r: 180, g: 60, b: 0 } },  // Deep red-orange
                { stop: 0.3, color: { r: 200, g: 80, b: 0 } },  // Brighter orange
                { stop: 0.6, color: { r: 150, g: 50, b: 0 } },  // Darker rust
                { stop: 1.0, color: { r: 100, g: 30, b: 0 } }   // Very dark brown-red
            ];
            const innerRadius = 100; // Inner radius of the ring
            const outerRadius = 200; // Outer radius of the ring
            generateCircularPatchyTexture(colorStops, 20, innerRadius, outerRadius, 0.8, 0.6, 0.05, 6, 0.5, true);
        }

        function downloadTexture() {
            const link = document.createElement('a');
            link.download = 'texture.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Initialize with a default texture
        generateUrineStainAndScale();

    </script>
<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
</script></body>
</html>
